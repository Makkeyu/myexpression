<!DOCTYPE html>
<html>
    <head>
        <title>My Interactive Page</title>
        <style>
            body {
                background-color: black;
                color: white;
                font-family: Arial;
                text-align: center;
            }
            h1 {
                color: yellow;
                font-size: 50px;
            }
            button {
                background-color: gold;
                color: black;
                font-size: 18px;
                padding: 10px 20px;
                border: none;
                cursor: pointer;
            }
            input {
                font-size: 18px;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <h1 id="title">Makkeyu's Page</h1>
        <button onclick="changeTitle()">Change Title</button>

        <br><br>

        <input id="nameInput" type="text" placeholder="Enter your name">
        <button onclick="greetUser()">Greet Me!</button>
        <h2 id="greeting"></h2>

        <script>
            function changeTitle() {
                document.getElementById("title").innerHTML = "I will be an IT Professional!";
            }

            function greetUser() {
                let name = document.getElementById("nameInput").value;
                document.getElementById("greeting").innerHTML = "Hello " + name + "! Welcome to my page!";
            }
        </script>
    </body>
</html>
