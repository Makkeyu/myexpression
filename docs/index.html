<!DOCTYPE html>
<html>
    <head>
        <title>Backgrounds and Shadows</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <style>

            body {
                margin: 0;
                padding: 0;
                font-family: 'Poppins', sans-serif;
            }

            /* Background image section */
            .hero {
                background-image: linear-gradient(
                    rgba(0,0,0,0.7),
                    rgba(0,0,0,0.7)
                ),
                url("https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1200");
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                height: 400px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }

            .hero h1 {
                color: gold;
                font-size: 70px;
                font-weight: 700;
                text-shadow: 0px 0px 30px gold;
                letter-spacing: 5px;
                text-transform: uppercase;
            }

            .hero p {
                color: white;
                font-size: 20px;
                text-shadow: 2px 2px 5px black;
            }

            /* Box shadow cards */
            .cards {
                background-color: #1a1a2e;
                padding: 50px;
                display: flex;
                justify-content: center;
                gap: 20px;
            }

            .card {
                background-color: #16213e;
                color: white;
                padding: 30px;
                width: 200px;
                text-align: center;
                border-radius: 15px;
                box-shadow: 0px 5px 20px rgba(0,0,0,0.5);
            }

            .card:hover {
                box-shadow: 0px 0px 30px gold;
            }

            .card h2 {
                color: gold;
                text-shadow: 0px 0px 10px gold;
            }

        </style>
    </head>
    <body>

        <!-- Hero Section -->
        <div class="hero">
            <div>
                <h1>Makkeyu</h1>
                <p>Future IT Professional</p>
            </div>
        </div>

        <!-- Cards Section -->
        <div class="cards">
            <div class="card">
                <h2>⚡ HTML</h2>
                <p>Structure of websites</p>
            </div>
            <div class="card">
                <h2>🎨 CSS</h2>
                <p>Style of websites</p>
            </div>
            <div class="card">
                <h2>💻 JS</h2>
                <p>Interactivity of websites</p>
            </div>
        </div>

    </body>
</html>
