<!DOCTYPE html>
<html>
    <head>
        <style>
            .box1 {
                width: 200px;
                height: 100px;
                background-color: #16213e;
                color: white;
                padding: 20px;
                border: 3px solid gold;
                margin: 30px auto;
                text-align: center;
            }

            .box2 {
                width: 200px;
                height: 100px;
                background-color: #0f3460;
                color: white;
                padding: 20px;
                border: 3px dashed lightblue;
                border-radius: 15px;
                margin: 30px auto;
                text-align: center;
            }

            .box3 {
                width: 150px;
                height: 150px;
                background-color: gold;
                color: black;
                border-radius: 50%;
                margin: 30px auto;
                text-align: center;
                padding: 30px;
            }
        </style>
    </head>
    <body>
        <div class="box1">I am a solid border box!</div>
        <div class="box2">I am a rounded dashed box!</div>
        <div class="box3">I am a circle!</div>
    </body>
</html>
