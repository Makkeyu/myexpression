<!DOCTYPE html>
<html>
    <head>
        <title>Text Styling</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body {
                background-color: #1a1a2e;
                padding: 40px;
                font-family: 'Poppins', sans-serif;
            }

            .heading {
                color: gold;
                font-size: 60px;
                font-weight: 700;
                text-align: center;
                letter-spacing: 5px;
                text-transform: uppercase;
            }

            .subheading {
                color: lightblue;
                font-size: 25px;
                font-style: italic;
                text-align: center;
                letter-spacing: 2px;
            }

            .paragraph {
                color: white;
                font-size: 18px;
                font-weight: 400;
                line-height: 1.8;
                text-align: justify;
            }

            .highlight {
                color: gold;
                font-weight: 700;
                text-decoration: underline;
            }

            .striked {
                color: gray;
                text-decoration: line-through;
            }

            .caps {
                color: lightgreen;
                text-transform: uppercase;
                letter-spacing: 3px;
            }
        </style>
    </head>
    <body>

        <p class="heading">Makkeyu</p>
        <p class="subheading">Future IT Professional</p>
        <p class="paragraph">
            I am learning web development and I love it!
            Every day I get better at HTML, CSS and JavaScript.
            <span class="highlight">My goal is to become a professional developer!</span>
        </p>
        <p class="striked">I know nothing about IT</p>
        <p class="caps">now I know html css and javascript!</p>

    </body>
</html>
