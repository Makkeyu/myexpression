<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background: linear-gradient(to bottom, #1a1a2e, #16213e);
                font-family: Arial;
                text-align: center;
                padding: 30px;
            }

            .box1 {
                background-color: #ff0000;
                color: white;
                padding: 20px;
                margin: 10px auto;
                width: 300px;
            }

            .box2 {
                background-color: rgb(0, 128, 255);
                color: white;
                padding: 20px;
                margin: 10px auto;
                width: 300px;
            }

            .box3 {
                background-color: rgba(255, 215, 0, 0.5);
                color: black;
                padding: 20px;
                margin: 10px auto;
                width: 300px;
            }

            .box4 {
                background: linear-gradient(to right, purple, pink);
                color: white;
                padding: 20px;
                margin: 10px auto;
                width: 300px;
            }

            .box5 {
                background: radial-gradient(circle, gold, black);
                color: white;
                padding: 20px;
                margin: 10px auto;
                width: 300px;
            }
        </style>
    </head>
    <body>
        <h1 style="color: white;">CSS Colors!</h1>
        <div class="box1">HEX Color #ff0000</div>
        <div class="box2">RGB Color rgb(0, 128, 255)</div>
        <div class="box3">RGBA Color rgba(255, 215, 0, 0.5)</div>
        <div class="box4">Linear Gradient purple to pink</div>
        <div class="box5">Radial Gradient gold to black</div>
    </body>
</html>
